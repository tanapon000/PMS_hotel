<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แก้ไขข้อมูลลูกค้า - Hotel PMS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #2196F3; padding-bottom: 10px; margin-top: 0; color: #1565c0; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .form-group input[readonly] { background: #e0e0e0; color: #757575; border: none; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #9e9e9e; color: white; }
        .btn-back:hover { background: #757575; }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 แก้ไขข้อมูลลูกค้า</h2>
    
    <div class="form-group">
        <label>รหัสลูกค้า (Customer ID)</label>
        <input type="text" id="custId" readonly>
    </div>
    
    <div class="form-group">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="custName" placeholder="ระบุชื่อลูกค้า">
    </div>

    <div class="form-group">
        <label>เลขบัตรประชาชน / Passport / เลขผู้เสียภาษี</label>
        <input type="text" id="custCardId" placeholder="ระบุเลข 13 หลัก หรือ Passport">
    </div>

    <div class="form-group">
        <label>เบอร์โทรศัพท์</label>
        <input type="text" id="custPhone" placeholder="ระบุเบอร์โทรศัพท์">
    </div>

    <div class="form-group">
        <label>อีเมล (Email)</label>
        <input type="email" id="custEmail" placeholder="example@email.com">
    </div>

    <div class="form-group">
        <label>ที่อยู่ (สำหรับออกใบเสร็จ)</label>
        <textarea id="custAddress" rows="3" placeholder="ระบุที่อยู่..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn btn-back" onclick="goBack()">◀ กลับไปหน้าก่อนหน้า</button>
        <button class="btn btn-save" id="btnSave" onclick="saveCustomerData()">💾 บันทึกข้อมูล</button>
    </div>
</div>

<script src="edit_customer_script.js"></script>
</body>
</html>
