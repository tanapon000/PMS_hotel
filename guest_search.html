<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหาผู้เข้าพัก - Hotel PMS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; }
        
        /* แถบเมนู */
        .top-nav-tabs { display: flex; background-color: #ffffff; border-bottom: 2px solid #e0e0e0; margin: -20px -20px 20px -20px; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-link { padding: 15px 25px; text-decoration: none; color: #666; font-weight: bold; font-size: 15px; border-bottom: 3px solid transparent; transition: all 0.3s ease; }
        .tab-link:hover { color: #2196F3; background-color: #f5f9ff; }
        .tab-link.active { color: #2196F3; border-bottom: 3px solid #2196F3; background-color: #e3f2fd; }

        /* กล่องค้นหา */
        .search-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 20px; align-items: flex-end; }
        .autocomplete { position: relative; display: inline-block; flex: 1; }
        .search-input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .search-label { font-weight: bold; color: #1565c0; display: block; margin-bottom: 8px; }
        
        /* สไตล์กล่อง Autocomplete */
        .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; border-bottom: none; border-top: none; z-index: 99; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px; }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #d4d4d4; font-size: 14px; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
        .autocomplete-active { background-color: #2196F3 !important; color: #ffffff; } /* แถบสีตอนกดลูกศรขึ้นลง */

        /* ตารางผลลัพธ์ */
        .table-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #1565c0; color: white; position: sticky; top: 0; }
        
        .row-hover:hover { background-color: #e3f2fd; cursor: pointer; }
        .locked-row { background-color: #f5f5f5; color: #757575; }
        .locked-row:hover { background-color: #eeeeee; }
        
        .badge-locked { background: #9e9e9e; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        .badge-edit { background: #4CAF50; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
    </style>
</head>
<body>

<nav class="top-nav-tabs">
    <a href="booking.html" class="tab-link">⚡ จองด่วน / สร้างบิลใหม่</a>
    <a href="dashboard_main.html" class="tab-link">📊 ตารางหลัก (ห้องพัก)</a>
    <a href="dashboard_pay.html" class="tab-link">💰 ตารางจ่ายเงิน (ปิดกะ)</a>
    <a href="guest_search.html" class="tab-link active">🔍 ค้นหาผู้เข้าพัก</a>
    <a href="maintenance.html" class="tab-link">🛠️ ปิดห้องซ่อม</a>
    <a href="outstanding.html" class="tab-link">ค้างชำระ (หนี้)</a>
</nav>

<h2 style="color: #1565c0; margin-bottom: 15px;">🔍 ค้นหารายชื่อและบิลการจองย้อนหลัง</h2>

<div class="search-container">
    <div class="autocomplete">
        <label class="search-label">👤 ค้นหาจากชื่อลูกค้า / ผู้เข้าพัก</label>
        <input id="searchName" type="text" class="search-input" placeholder="พิมพ์ชื่อเพื่อค้นหา...">
    </div>
    <div class="autocomplete">
        <label class="search-label">🧾 ค้นหาจาก Booking ID</label>
        <input id="searchBookingId" type="text" class="search-input" placeholder="เช่น 105, 106...">
    </div>
    <div class="autocomplete">
        <label class="search-label">🌐 ค้นหาจาก OTA Reference</label>
        <input id="searchOta" type="text" class="search-input" placeholder="หมายเลขการจองจาก Agoda/Booking...">
    </div>
    <button onclick="executeSearch()" style="padding: 10px 20px; font-size: 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 43px;">ค้นหา 🔎</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 80px;">Booking ID</th>
                <th>ชื่อลูกค้า / ผู้เข้าพัก</th>
                <th style="width: 80px;">ห้องพัก</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>ราคารวม (บาท)</th>
                <th style="width: 100px;">สถานะ</th>
            </tr>
        </thead>
        <tbody id="resultTableBody">
            <tr><td colspan="7" style="color: gray; padding: 30px;">พิมพ์คำค้นหาด้านบน เพื่อดูข้อมูลครับ</td></tr>
        </tbody>
    </table>
</div>

<script src="supabase.js"></script>
<script src="guest_search_script.js"></script>
<script src="auth_guard.js"></script>
</body>
</html>
