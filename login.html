<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Hotel PMS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e3f2fd; /* พื้นหลังสีฟ้าอ่อน */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            margin-top: 0;
            color: #1565c0;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 5px rgba(33, 150, 243, 0.3);
        }
        .btn-login {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #1565c0;
        }
        .btn-login:disabled {
            background: #9e9e9e;
            cursor: not-allowed;
        }
        #errorMessage {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: #757575;
            font-size: 14px;
            transition: color 0.3s;
        }
        .btn-back:hover {
            color: #2196F3; /* เปลี่ยนเป็นสีฟ้าเมื่อเอาเมาส์ชี้ */
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🏨 Smile Place</h2>
    
    <div id="errorMessage"></div>

    <div class="form-group">
        <label>อีเมล (Email)</label>
        <input type="email" id="email" placeholder="admin@hotel.com">
    </div>
    <div class="form-group">
        <label>รหัสผ่าน (Password)</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn-login" id="btnLogin" onclick="handleLogin()">เข้าสู่ระบบ</button>
    <div style="margin-top: 15px;">
    <a href="index.html" class="btn-back">← กลับไปยังหน้าหลัก</a>
</div>
</div>

<script src="supabase.js"></script>
<script src="login_script.js"></script>

</body>
</html>
