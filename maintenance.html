<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการห้องชำรุด/ปิดซ่อม - Hotel PMS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; }
        
        /* แถบเมนู */
        .top-nav-tabs { display: flex; background-color: #ffffff; border-bottom: 2px solid #e0e0e0; margin: -20px -20px 20px -20px; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-x: auto;}
        .tab-link { padding: 15px 25px; text-decoration: none; color: #666; font-weight: bold; font-size: 15px; border-bottom: 3px solid transparent; transition: all 0.3s ease; white-space: nowrap; }
        .tab-link:hover { color: #2196F3; background-color: #f5f9ff; }
        .tab-link.active { color: #d32f2f; border-bottom: 3px solid #d32f2f; background-color: #ffebee; }

        .header-container { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-add:hover { background: #b71c1c; }

        /* ตาราง */
        .table-container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #d32f2f; color: white; }
        tbody tr:hover { background-color: #f5f5f5; }

        /* ป้ายกำกับ (Badge) */
        .badge-conflict { background-color: #ff9800; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; cursor: pointer; text-decoration: none; margin: 2px; }
        .badge-conflict:hover { background-color: #e65100; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 400px; padding: 20px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<nav class="top-nav-tabs">
    <a href="booking.html" class="tab-link">⚡ จองด่วน / สร้างบิลใหม่</a>
    <a href="dashboard_main.html" class="tab-link">📊 ตารางหลัก (ห้องพัก)</a>
    <a href="dashboard_pay.html" class="tab-link">💰 ตารางจ่ายเงิน (ปิดกะ)</a>
    <a href="guest_search.html" class="tab-link">🔍 ค้นหาผู้เข้าพัก</a>
    <a href="maintenance.html" class="tab-link active">🛠️ ปิดห้องซ่อม</a>
    <a href="outstanding.html" class="tab-link">ค้างชำระ (หนี้)</a>
</nav>

<div class="header-container">
    <h2 style="margin: 0; color: #c62828;">🛠️ จัดการห้องชำรุด / ปิดซ่อมบำรุง</h2>
    <button class="btn-add" onclick="openMaintenanceModal()">+ เพิ่มรายการปิดห้อง</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ห้องพัก</th>
                <th>วันเริ่มปิดห้อง</th>
                <th>วันเปิดใช้งาน (สิ้นสุด)</th>
                <th style="width: 30%;">สาเหตุที่เสีย</th>
                <th style="width: 25%;">⚠️ บิลลูกค้าที่ได้รับผลกระทบ</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="maintenanceTableBody">
            <tr><td colspan="6">⏳ กำลังโหลดข้อมูล...</td></tr>
        </tbody>
    </table>
</div>

<div id="maintenanceModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: #d32f2f; border-bottom: 2px solid #ffcdd2; padding-bottom: 10px;">🛠️ ระบุข้อมูลปิดห้อง</h3>
        
        <div class="form-group">
            <label>เลือกห้องพัก</label>
            <select id="mtRoomId"></select>
        </div>
        <div class="form-group">
            <label>วันที่เริ่มปิดห้อง</label>
            <input type="date" id="mtStartDate">
        </div>
        <div class="form-group">
            <label>วันที่คาดว่าจะเสร็จ (สิ้นสุด)</label>
            <input type="date" id="mtEndDate">
        </div>
        <div class="form-group">
            <label>สาเหตุ / รายละเอียด</label>
            <textarea id="mtReason" rows="3" placeholder="เช่น แอร์น้ำหยด, ท่อน้ำแตก, ทาสีใหม่..."></textarea>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="saveMaintenance()" style="flex: 1; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">💾 บันทึกข้อมูล</button>
            <button onclick="closeMaintenanceModal()" style="flex: 1; padding: 10px; background: #9e9e9e; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">ยกเลิก</button>
        </div>
    </div>
</div>

<script src="supabase.js"></script>
<script src="maintenance_script.js"></script>
<script src="auth_guard.js"></script>
</body>
</html>
